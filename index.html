
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Finanza - App de Gestión de Finanzas con Google Sheets</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9f5ff;
      color: #333;
    }
    
    .header {
      background: linear-gradient(135deg, #410C59 0%, #5c2e7f 100%);
      color: #E3B3FF;
      padding: 20px;
      text-align: center;
      border-bottom: 3px solid #820021;
    }
    
    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .sync-status {
      font-size: 11px;
      margin-top: 8px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      display: inline-block;
    }
    
    .sync-status.syncing {
      background: rgba(255,193,7,0.3);
    }
    
    .sync-status.synced {
      background: rgba(76,175,80,0.3);
    }
    
    .tabs {
      display: flex;
      background: white;
      border-bottom: 2px solid #e8dff5;
      overflow-x: auto;
    }
    
    .tab-btn {
      flex: 1;
      padding: 14px;
      border: none;
      background: transparent;
      color: #DE2151;
      cursor: pointer;
      font-size: 13px;
      font-weight: 400;
      transition: all 0.3s;
      white-space: nowrap;
    }
    
    .tab-btn.active {
      background: #410C5920;
      color: #410C59;
      font-weight: 600;
      border-bottom: 3px solid #820021;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    h2 {
      color: #410C59;
      margin-bottom: 20px;
      font-size: 22px;
    }
    
    h3 {
      color: #410C59;
      margin-bottom: 15px;
      font-size: 16px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      color: white;
      font-weight: 600;
    }
    
    .stat-card.primary {
      background: #410C59;
      color: #E3B3FF;
    }
    
    .stat-card.secondary {
      background: #820021;
      color: #DE2151;
    }
    
    .stat-card.accent {
      background: #91D6FF;
      color: #410C59;
    }
    
    .stat-card p {
      font-size: 12px;
      opacity: 0.9;
      margin-bottom: 8px;
    }
    
    .stat-card h3 {
      margin: 0;
      font-size: 24px;
      color: inherit;
    }
    
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #e8dff5;
      margin-bottom: 20px;
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      margin-bottom: 15px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
    }
    
    label {
      margin-bottom: 6px;
      color: #410C59;
      font-size: 12px;
      font-weight: 600;
    }
    
    input, select, textarea {
      padding: 8px;
      border: 1px solid #e8dff5;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #410C59;
      box-shadow: 0 0 0 3px rgba(65, 12, 89, 0.1);
    }
    
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
    }
    
    .btn.primary {
      background: #410C59;
      color: #E3B3FF;
    }
    
    .btn.primary:hover {
      opacity: 0.85;
    }
    
    .btn.primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .btn.secondary {
      background: #820021;
      color: #DE2151;
    }
    
    .btn.secondary:hover {
      opacity: 0.85;
    }
    
    .btn.secondary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .btn.accent {
      background: #91D6FF;
      color: #410C59;
    }
    
    .btn.accent:hover {
      opacity: 0.85;
    }
    
    .btn.accent:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .tarjeta {
      background: linear-gradient(135deg, #410C59 0%, #5c2e7f 100%);
      color: #E3B3FF;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
    }
    
    .tarjeta.credito {
      background: linear-gradient(135deg, #820021 0%, #a80033 100%);
      color: #DE2151;
    }
    
    .tarjeta-header {
      font-size: 12px;
      opacity: 0.85;
      margin-bottom: 15px;
    }
    
    .tarjeta-nombre {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    
    .tarjeta-info {
      font-size: 12px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
    }
    
    .tarjeta-bar {
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      overflow: hidden;
    }
    
    .tarjeta-bar-fill {
      height: 100%;
      background: rgba(255,255,255,0.6);
      transition: width 0.3s;
    }
    
    .list-item {
      background: white;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #e8dff5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .list-item-left p {
      margin: 4px 0 0 0;
      font-size: 12px;
      color: #DE2151;
    }
    
    .list-item-left p:first-child {
      margin: 0;
      font-weight: 600;
      color: #410C59;
    }
    
    .list-item-right {
      text-align: right;
    }
    
    .list-item-right p {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    
    .empty-state {
      color: #DE2151;
      text-align: center;
      padding: 40px 20px;
    }
    
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9f5ff;
    }
    
    .login-box {
      text-align: center;
      max-width: 400px;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 12px rgba(65, 12, 89, 0.1);
    }
    
    .login-emoji {
      font-size: 48px;
      margin-bottom: 20px;
    }
    
    .login-box h1 {
      color: #410C59;
      font-size: 28px;
      margin-bottom: 10px;
    }
    
    .login-box p {
      color: #DE2151;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 13px;
    }
    
    .alert.success {
      background: #c8e6c9;
      color: #2e7d32;
    }
    
    .alert.error {
      background: #ffcdd2;
      color: #c62828;
    }
    
    .alert.info {
      background: #bbdefb;
      color: #1565c0;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script>
const { useState, useEffect } = React;
const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz84HxflRScTsIW8M2Z3XslowFqeNoUVlFRC70qh1o5kJCMf80yEu7J33Jjsoya_AYu/exec';

function FinanzasApp() {
  const [currentUser, setCurrentUser] = useState(null);
  const [activeTab, setActiveTab] = useState('dashboard');
  const [tarjetas, setTarjetas] = useState([]);
  const [gastos, setGastos] = useState([]);
  const [ingresos, setIngresos] = useState([]);
  const [syncStatus, setSyncStatus] = useState('idle');
  const [syncMessage, setSyncMessage] = useState('');
  const [categorias] = useState([
    { id: 1, nombre: 'Comida', icono: '🍔', color: '#FF6B6B' },
    { id: 2, nombre: 'Transporte', icono: '🚗', color: '#4ECDC4' },
    { id: 3, nombre: 'Entretenimiento', icono: '🎬', color: '#FFE66D' },
    { id: 4, nombre: 'Servicios', icono: '💳', color: '#95E1D3' },
    { id: 5, nombre: 'Salud', icono: '🏥', color: '#F38181' },
    { id: 6, nombre: 'Otros', icono: '📦', color: '#AA96DA' },
  ]);

  const [nuevoGasto, setNuevoGasto] = useState({ 
    fecha: new Date().toISOString().split('T')[0], 
    monto: '', 
    categoria: '', 
    tarjeta: '', 
    descripcion: '' 
  });
  const [nuevoIngreso, setNuevoIngreso] = useState({ 
    fecha: new Date().toISOString().split('T')[0], 
    monto: '', 
    fuente: '', 
    tarjeta: '', 
    descripcion: '' 
  });
  const [nuevaTarjeta, setNuevaTarjeta] = useState({ 
    nombre: '', 
    tipo: 'credito', 
    limite: '', 
    saldoInicial: '' 
  });

  useEffect(() => {
    const saved = localStorage.getItem('finanzasData');
    if (saved) {
      const data = JSON.parse(saved);
      setTarjetas(data.tarjetas || []);
      setGastos(data.gastos || []);
      setIngresos(data.ingresos || []);
    }
  }, []);

  useEffect(() => {
    if (tarjetas.length > 0 || gastos.length > 0 || ingresos.length > 0) {
      localStorage.setItem('finanzasData', JSON.stringify({ tarjetas, gastos, ingresos }));
    }
  }, [tarjetas, gastos, ingresos]);

  const handleGoogleLogin = () => {
    setCurrentUser({
      name: 'Mi Finanza',
      email: 'usuario@gmail.com',
      avatar: '👤'
    });
  };

  const syncToGoogleSheets = async (tipo, datos) => {
    try {
      setSyncStatus('syncing');
      setSyncMessage('Sincronizando...');
      
      const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          tipo: tipo,
          ...datos
        })
      });
      
      if (response.ok) {
        setSyncStatus('synced');
        setSyncMessage('✅ Sincronizado con Google Sheets');
        setTimeout(() => {
          setSyncStatus('idle');
          setSyncMessage('');
        }, 3000);
        return true;
      } else {
        setSyncStatus('error');
        setSyncMessage('⚠️ Error al sincronizar');
        setTimeout(() => setSyncStatus('idle'), 3000);
        return false;
      }
    } catch (err) {
      setSyncStatus('error');
      setSyncMessage('⚠️ Error de conexión');
      setTimeout(() => setSyncStatus('idle'), 3000);
      console.error('Sync error:', err);
      return false;
    }
  };

  const agregarTarjeta = async () => {
    if (nuevaTarjeta.nombre && nuevaTarjeta.limite && nuevaTarjeta.saldoInicial) {
      const tarjeta = {
        id: Date.now(),
        ...nuevaTarjeta,
        saldoActual: parseFloat(nuevaTarjeta.saldoInicial),
      };
      
      await syncToGoogleSheets('tarjeta', nuevaTarjeta);
      
      setTarjetas([...tarjetas, tarjeta]);
      setNuevaTarjeta({ nombre: '', tipo: 'credito', limite: '', saldoInicial: '' });
    }
  };

  const agregarGasto = async () => {
    if (nuevoGasto.monto && nuevoGasto.categoria && nuevoGasto.tarjeta) {
      const gasto = {
        id: Date.now(),
        ...nuevoGasto,
        monto: parseFloat(nuevoGasto.monto),
        timestamp: new Date().toISOString(),
      };
      
      await syncToGoogleSheets('gasto', nuevoGasto);
      
      setGastos([...gastos, gasto]);
      setTarjetas(tarjetas.map(t => 
        t.id === parseInt(nuevoGasto.tarjeta) 
          ? { ...t, saldoActual: t.saldoActual - gasto.monto }
          : t
      ));
      setNuevoGasto({ 
        fecha: new Date().toISOString().split('T')[0], 
        monto: '', 
        categoria: '', 
        tarjeta: '', 
        descripcion: '' 
      });
    }
  };

  const agregarIngreso = async () => {
    if (nuevoIngreso.monto && nuevoIngreso.fuente && nuevoIngreso.tarjeta) {
      const ingreso = {
        id: Date.now(),
        ...nuevoIngreso,
        monto: parseFloat(nuevoIngreso.monto),
        timestamp: new Date().toISOString(),
      };
      
      await syncToGoogleSheets('ingreso', nuevoIngreso);
      
      setIngresos([...ingresos, ingreso]);
      setTarjetas(tarjetas.map(t => 
        t.id === parseInt(nuevoIngreso.tarjeta) 
          ? { ...t, saldoActual: t.saldoActual + ingreso.monto }
          : t
      ));
      setNuevoIngreso({ 
        fecha: new Date().toISOString().split('T')[0], 
        monto: '', 
        fuente: '', 
        tarjeta: '', 
        descripcion: '' 
      });
    }
  };

  const totalGastosMes = gastos
    .filter(g => new Date(g.fecha).toISOString().split('T')[0].slice(0, 7) === new Date().toISOString().slice(0, 7))
    .reduce((sum, g) => sum + g.monto, 0);

  const totalIngresosMes = ingresos
    .filter(i => new Date(i.fecha).toISOString().split('T')[0].slice(0, 7) === new Date().toISOString().slice(0, 7))
    .reduce((sum, i) => sum + i.monto, 0);

  const saldoTotal = tarjetas.reduce((sum, t) => sum + t.saldoActual, 0);

  if (!currentUser) {
    return (
      <div className="login-container">
        <div className="login-box">
          <div className="login-emoji">💰</div>
          <h1>Mi Finanza</h1>
          <p>Controla tus gastos e ingresos con estilo</p>
          <button className="btn primary" onClick={handleGoogleLogin}>
            🔐 Iniciar sesión
          </button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="header">
        <h1>💎 Mi Finanza</h1>
        <p>Bienvenida, {currentUser.name}</p>
        <div className={`sync-status ${syncStatus}`}>
          {syncStatus === 'syncing' && '⏳ ' + syncMessage}
          {syncStatus === 'synced' && '✅ ' + syncMessage}
          {syncStatus === 'error' && '❌ ' + syncMessage}
          {syncStatus === 'idle' && '📊 Conectada a Google Sheets'}
        </div>
      </div>

      <div className="tabs">
        {['dashboard', 'gastos', 'ingresos', 'tarjetas', 'analisis'].map(tab => (
          <button
            key={tab}
            className={`tab-btn ${activeTab === tab ? 'active' : ''}`}
            onClick={() => setActiveTab(tab)}
          >
            {tab === 'dashboard' && '📊 Dashboard'}
            {tab === 'gastos' && '💸 Gastos'}
            {tab === 'ingresos' && '💵 Ingresos'}
            {tab === 'tarjetas' && '💳 Tarjetas'}
            {tab === 'analisis' && '📈 Análisis'}
          </button>
        ))}
      </div>

      <div className="container">
        {syncMessage && (
          <div className={`alert ${syncStatus === 'error' ? 'error' : syncStatus === 'synced' ? 'success' : 'info'}`}>
            {syncMessage}
          </div>
        )}

        {activeTab === 'dashboard' && (
          <div>
            <h2>Resumen General</h2>
            <div className="stats-grid">
              <div className="stat-card primary">
                <p>Saldo Total</p>
                <h3>${saldoTotal.toFixed(2)}</h3>
              </div>
              <div className="stat-card secondary">
                <p>Gastos este mes</p>
                <h3>-${totalGastosMes.toFixed(2)}</h3>
              </div>
              <div className="stat-card accent">
                <p>Ingresos este mes</p>
                <h3>+${totalIngresosMes.toFixed(2)}</h3>
              </div>
            </div>

            <h3>Tus Tarjetas</h3>
            {tarjetas.length > 0 ? (
              tarjetas.map(tarjeta => (
                <div key={tarjeta.id} className={`tarjeta ${tarjeta.tipo === 'credito' ? 'credito' : ''}`}>
                  <div className="tarjeta-header">
                    {tarjeta.tipo === 'credito' ? '💳 CRÉDITO' : '🏦 DÉBITO'}
                  </div>
                  <div className="tarjeta-nombre">{tarjeta.nombre}</div>
                  <div className="tarjeta-info">
                    <span>Saldo disponible:</span>
                    <strong>${tarjeta.saldoActual.toFixed(2)}</strong>
                  </div>
                  <div className="tarjeta-info">
                    <span>Límite:</span>
                    <strong>${tarjeta.limite}</strong>
                  </div>
                  <div className="tarjeta-bar">
                    <div className="tarjeta-bar-fill" style={{ width: `${(tarjeta.saldoActual / parseFloat(tarjeta.limite)) * 100}%` }}></div>
                  </div>
                </div>
              ))
            ) : (
              <div className="empty-state">
                📭 Aún no tienes tarjetas. ¡Agrega una en la sección de Tarjetas!
              </div>
            )}
          </div>
        )}

        {activeTab === 'gastos' && (
          <div>
            <h2>Registrar Gasto</h2>
            {tarjetas.length > 0 ? (
              <div className="card">
                <div className="form-grid">
                  <div className="form-group">
                    <label>Fecha</label>
                    <input type="date" value={nuevoGasto.fecha} onChange={(e) => setNuevoGasto({ ...nuevoGasto, fecha: e.target.value })} />
                  </div>
                  <div className="form-group">
                    <label>Monto</label>
                    <input type="number" step="0.01" placeholder="0.00" value={nuevoGasto.monto} onChange={(e) => setNuevoGasto({ ...nuevoGasto, monto: e.target.value })} />
                  </div>
                  <div className="form-group">
                    <label>Categoría</label>
                    <select value={nuevoGasto.categoria} onChange={(e) => setNuevoGasto({ ...nuevoGasto, categoria: e.target.value })}>
                      <option value="">Selecciona...</option>
                      {categorias.map(cat => <option key={cat.id} value={cat.id}>{cat.icono} {cat.nombre}</option>)}
                    </select>
                  </div>
                  <div className="form-group">
                    <label>Tarjeta</label>
                    <select value={nuevoGasto.tarjeta} onChange={(e) => setNuevoGasto({ ...nuevoGasto, tarjeta: e.target.value })}>
                      <option value="">Selecciona...</option>
                      {tarjetas.map(t => <option key={t.id} value={t.id}>{t.nombre}</option>)}
                    </select>
                  </div>
                </div>
                <div className="form-group" style={{ marginBottom: '15px' }}>
                  <label>Descripción (opcional)</label>
                  <input type="text" placeholder="Ej: Cena en restaurante" value={nuevoGasto.descripcion} onChange={(e) => setNuevoGasto({ ...nuevoGasto, descripcion: e.target.value })} />
                </div>
                <button className="btn secondary" onClick={agregarGasto}>💸 Registrar Gasto</button>
              </div>
            ) : (
              <div style={{ color: '#DE2151', background: '#fff3e0', padding: '15px', borderRadius: '8px', marginBottom: '20px' }}>
                ⚠️ Debes agregar al menos una tarjeta primero
              </div>
            )}

            <h3>Últimos Gastos</h3>
            {gastos.length > 0 ? (
              gastos.slice().reverse().map(gasto => {
                const categoria = categorias.find(c => c.id === parseInt(gasto.categoria));
                const tarjeta = tarjetas.find(t => t.id === parseInt(gasto.tarjeta));
                return (
                  <div key={gasto.id} className="list-item">
                    <div className="list-item-left">
                      <p>{categoria?.nombre}</p>
                      <p>{tarjeta?.nombre} • {gasto.fecha}</p>
                      {gasto.descripcion && <p>{gasto.descripcion}</p>}
                    </div>
                    <div className="list-item-right">
                      <p style={{ color: '#820021' }}>-${gasto.monto.toFixed(2)}</p>
                    </div>
                  </div>
                );
              })
            ) : (
              <div className="empty-state">📭 Aún no tienes gastos registrados</div>
            )}
          </div>
        )}

        {activeTab === 'ingresos' && (
          <div>
            <h2>Registrar Ingreso</h2>
            {tarjetas.length > 0 ? (
              <div className="card">
                <div className="form-grid">
                  <div className="form-group">
                    <label>Fecha</label>
                    <input type="date" value={nuevoIngreso.fecha} onChange={(e) => setNuevoIngreso({ ...nuevoIngreso, fecha: e.target.value })} />
                  </div>
                  <div className="form-group">
                    <label>Monto</label>
                    <input type="number" step="0.01" placeholder="0.00" value={nuevoIngreso.monto} onChange={(e) => setNuevoIngreso({ ...nuevoIngreso, monto: e.target.value })} />
                  </div>
                  <div className="form-group">
                    <label>Fuente</label>
                    <select value={nuevoIngreso.fuente} onChange={(e) => setNuevoIngreso({ ...nuevoIngreso, fuente: e.target.value })}>
                      <option value="">Selecciona...</option>
                      <option value="salario">💼 Salario</option>
                      <option value="freelance">💻 Freelance</option>
                      <option value="inversiones">📈 Inversiones</option>
                      <option value="otro">🎁 Otro</option>
                    </select>
                  </div>
                  <div className="form-group">
                    <label>Tarjeta</label>
                    <select value={nuevoIngreso.tarjeta} onChange={(e) => setNuevoIngreso({ ...nuevoIngreso, tarjeta: e.target.value })}>
                      <option value="">Selecciona...</option>
                      {tarjetas.map(t => <option key={t.id} value={t.id}>{t.nombre}</option>)}
                    </select>
                  </div>
                </div>
                <div className="form-group" style={{ marginBottom: '15px' }}>
                  <label>Descripción (opcional)</label>
                  <input type="text" placeholder="Ej: Pago de cliente X" value={nuevoIngreso.descripcion} onChange={(e) => setNuevoIngreso({ ...nuevoIngreso, descripcion: e.target.value })} />
                </div>
                <button className="btn accent" onClick={agregarIngreso}>💵 Registrar Ingreso</button>
              </div>
            ) : (
              <div style={{ color: '#DE2151', background: '#fff3e0', padding: '15px', borderRadius: '8px', marginBottom: '20px' }}>
                ⚠️ Debes agregar al menos una tarjeta primero
              </div>
            )}

            <h3>Últimos Ingresos</h3>
            {ingresos.length > 0 ? (
              ingresos.slice().reverse().map(ingreso => {
                const tarjeta = tarjetas.find(t => t.id === parseInt(ingreso.tarjeta));
                return (
                  <div key={ingreso.id} className="list-item">
                    <div className="list-item-left">
                      <p>{ingreso.fuente}</p>
                      <p>{tarjeta?.nombre} • {ingreso.fecha}</p>
                      {ingreso.descripcion && <p>{ingreso.descripcion}</p>}
                    </div>
                    <div className="list-item-right">
                      <p style={{ color: '#91D6FF' }}>+${ingreso.monto.toFixed(2)}</p>
                    </div>
                  </div>
                );
              })
            ) : (
              <div className="empty-state">📭 Aún no tienes ingresos registrados</div>
            )}
          </div>
        )}

        {activeTab === 'tarjetas' && (
          <div>
            <h2>Mis Tarjetas</h2>
            <div className="card">
              <h3>Agregar Nueva Tarjeta</h3>
              <div className="form-grid">
                <div className="form-group">
                  <label>Nombre</label>
                  <input type="text" placeholder="Ej: Visa Banco X" value={nuevaTarjeta.nombre} onChange={(e) => setNuevaTarjeta({ ...nuevaTarjeta, nombre: e.target.value })} />
                </div>
                <div className="form-group">
                  <label>Tipo</label>
                  <select value={nuevaTarjeta.tipo} onChange={(e) => setNuevaTarjeta({ ...nuevaTarjeta, tipo: e.target.value })}>
                    <option value="credito">💳 Crédito</option>
                    <option value="debito">🏦 Débito</option>
                  </select>
                </div>
                <div className="form-group">
                  <label>Límite/Saldo</label>
                  <input type="number" step="0.01" placeholder="0.00" value={nuevaTarjeta.limite} onChange={(e) => setNuevaTarjeta({ ...nuevaTarjeta, limite: e.target.value })} />
                </div>
                <div className="form-group">
                  <label>Saldo Inicial</label>
                  <input type="number" step="0.01" placeholder="0.00" value={nuevaTarjeta.saldoInicial} onChange={(e) => setNuevaTarjeta({ ...nuevaTarjeta, saldoInicial: e.target.value })} />
                </div>
              </div>
              <button className="btn primary" onClick={agregarTarjeta}>➕ Agregar Tarjeta</button>
            </div>

            {tarjetas.length > 0 && (
              <div>
                <h3>Tarjetas Registradas</h3>
                {tarjetas.map(tarjeta => (
                  <div key={tarjeta.id} className={`tarjeta ${tarjeta.tipo === 'credito' ? 'credito' : ''}`}>
                    <div className="tarjeta-header">
                      {tarjeta.tipo === 'credito' ? '💳 CRÉDITO' : '🏦 DÉBITO'}
                    </div>
                    <div className="tarjeta-nombre">{tarjeta.nombre}</div>
                    <div className="tarjeta-info">
                      <span>Saldo actual:</span>
                      <strong>${tarjeta.saldoActual.toFixed(2)}</strong>
                    </div>
                    <div className="tarjeta-info">
                      <span>Límite:</span>
                      <strong>${tarjeta.limite}</strong>
                    </div>
                    <div className="tarjeta-info">
                      <span>Gastado:</span>
                      <strong>${(parseFloat(tarjeta.limite) - tarjeta.saldoActual).toFixed(2)}</strong>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {activeTab === 'analisis' && (
          <div>
            <h2>Análisis de Gastos</h2>
            {gastos.length > 0 ? (
              <div className="card">
                <h3>Resumen por Categoría</h3>
                {categorias.map(cat => {
                  const total = gastos.filter(g => g.categoria === cat.id).reduce((sum, g) => sum + g.monto, 0);
                  if (total === 0) return null;
                  return (
                    <div key={cat.id} style={{ marginBottom: '12px' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '6px' }}>
                        <span style={{ color: '#410C59', fontWeight: '500' }}>{cat.nombre}</span>
                        <span style={{ color: '#820021', fontWeight: '600' }}>${total.toFixed(2)}</span>
                      </div>
                      <div style={{ height: '8px', background: '#e8dff5', borderRadius: '4px', overflow: 'hidden' }}>
                        <div style={{ height: '100%', background: cat.color, width: `${(total / gastos.reduce((sum, g) => sum + g.monto, 0)) * 100}%` }}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : (
              <div className="empty-state">📭 Aún no tienes gastos para analizar</div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<FinanzasApp />);
</script>

</body>
</html>
